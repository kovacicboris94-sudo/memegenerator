const RECENT_HISTORY_KEY = "recent-elements";
const RECENT_LIMIT = 12;

function getRecentlyUsed() {
  try {
    return JSON.parse(localStorage.getItem(RECENT_HISTORY_KEY) || "[]");
  } catch (e) {
    return [];
  }
}

function rememberUsed(items) {
  let recent = getRecentlyUsed();
  recent = recent.concat(items);
  if (recent.length > RECENT_LIMIT) {
    recent = recent.slice(recent.length - RECENT_LIMIT);
  }
  localStorage.setItem(RECENT_HISTORY_KEY, JSON.stringify(recent));
}

function pickFresh(arr) {
  const recent = getRecentlyUsed();
  const available = arr.filter((item) => !recent.includes(item));
  const pool = available.length > 0 ? available : arr;
  return pool[Math.floor(Math.random() * pool.length)];
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function pickTwoDistinct(arr) {
  const a1 = pick(arr);
  let a2 = pick(arr);
  while (a2 === a1) a2 = pick(arr);
  return [a1, a2];
}

  rememberUsed([subject, action, style]);
  return { description: subject + " " + action, style };
}

async function fetchAsBlob(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error("Image generation failed: " + res.status);
  return res.blob();
}

async function uploadToStorage(blob, filename) {
  const res = await fetch(
    SUPABASE_URL + "/storage/v1/object/memegenerator/" + filename,
    {
      method: "POST",
      headers: {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": "Bearer " + SUPABASE_ANON_KEY,
        "Content-Type": "image/png"
      },
      body: blob
    }
  );
  if (!res.ok) throw new Error("Upload to storage failed: " + res.status);
  return SUPABASE_URL + "/storage/v1/object/public/memegenerator/" + filename;
}

function supabaseHeaders() {
  return {
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": "Bearer " + SUPABASE_ANON_KEY,
    "Content-Type": "application/json"
  };
}

async function fetchMemes() {
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/memes?select=*&order=created_at.desc&limit=60",
    { headers: supabaseHeaders() }
  );
  if (!res.ok) throw new Error("Failed to fetch memes: " + res.status);
  return res.json();
}

async function likeMeme(memeId, currentLikes) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/memes?id=eq." + memeId, {
    method: "PATCH",
    headers: { ...supabaseHeaders(), "Prefer": "return=representation" },
    body: JSON.stringify({ likes: currentLikes + 1 })
  });
  if (!res.ok) throw new Error("Failed to like meme: " + res.status);
  return res.json();
}

function getLikedMemes() {
  try {
    return JSON.parse(localStorage.getItem("liked-memes") || "[]");
  } catch (e) {
    return [];
  }
}

function markMemeAsLiked(memeId) {
  const liked = getLikedMemes();
  liked.push(memeId);
  localStorage.setItem("liked-memes", JSON.stringify(liked));
}

async function trackVisit() {
  try {
    const res = await fetch(
      SUPABASE_URL + "/rest/v1/site_stats?id=eq.1&select=visits",
      { headers: supabaseHeaders() }
    );
    const data = await res.json();
    const current = (data && data[0] && data[0].visits) || 0;
    const updated = current + 1;

    await fetch(SUPABASE_URL + "/rest/v1/site_stats?id=eq.1", {
      method: "PATCH",
      headers: supabaseHeaders(),
      body: JSON.stringify({ visits: updated })
    });

    document.getElementById("visitor-count").textContent = updated.toLocaleString() + " visits since launch";
  } catch (e) {
    console.error("Visitor tracking failed:", e);
  }
}

async function insertMeme(meme) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/memes", {
    method: "POST",
    headers: { ...supabaseHeaders(), "Prefer": "return=representation" },
    body: JSON.stringify(meme)
  });
  if (!res.ok) throw new Error("Failed to save meme: " + res.status);
  return res.json();
}

const PASTELS = [
  "#ffe3df", "#fff0d9", "#e3f3e6", "#e0eefc", "#f3e3fa", "#ffe6f0", "#e3faf6"
];

function updateStats(memes) {
  document.getElementById("stat-total").textContent = memes.length;
  const today = new Date().toDateString();
  const todayCount = memes.filter((m) => new Date(m.created_at).toDateString() === today).length;
  document.getElementById("stat-today").textContent = todayCount;
}

function renderGallery(memes) {
  const gallery = document.getElementById("gallery");
  const emptyMsg = document.getElementById("empty-msg");
  gallery.innerHTML = "";
  updateStats(memes || []);

  if (!memes || memes.length === 0) {
    gallery.appendChild(emptyMsg);
    return;
  }

  memes.forEach((m, index) => {
    const card = document.createElement("div");
    card.className = "meme-card" + (index === 0 ? " featured" : "");

    const imgWrap = document.createElement("div");
    imgWrap.className = "img-wrap";
    imgWrap.style.background = PASTELS[Math.floor(Math.random() * PASTELS.length)];

    if (index === 0) {
      const badge = document.createElement("span");
      badge.className = "new-badge";
      badge.textContent = "Latest";
      imgWrap.appendChild(badge);
    }

    const img = document.createElement("img");
    img.alt = m.caption;
    img.loading = "lazy";

    const overlay = document.createElement("div");
    overlay.className = "loading-overlay";
    overlay.innerHTML = '<span class="spinner"></span><span>Loading image...</span>';

    attachImageWithRetry(img, overlay, m);

    imgWrap.appendChild(img);
    imgWrap.appendChild(overlay);

    const caption = document.createElement("p");
    caption.className = "caption";
    caption.textContent = m.caption;

    card.appendChild(imgWrap);
    card.appendChild(caption);
    card.appendChild(buildCardActions(m));
    gallery.appendChild(card);
  });
}

function buildCardActions(m) {
  const actions = document.createElement("div");
  actions.className = "card-actions";

  const likedMemes = getLikedMemes();
  const alreadyLiked = likedMemes.includes(m.id);

  const likeBtn = document.createElement("button");
  likeBtn.className = "like-btn" + (alreadyLiked ? " liked" : "");
  likeBtn.innerHTML =
    '<svg viewBox="0 0 24 24" fill="' + (alreadyLiked ? "currentColor" : "none") + '" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>' +
    '<span>' + (m.likes || 0) + '</span>';

  if (alreadyLiked) {
    likeBtn.disabled = true;
  } else {
    likeBtn.addEventListener("click", async () => {
      likeBtn.disabled = true;
      try {
        await likeMeme(m.id, m.likes || 0);
        markMemeAsLiked(m.id);
        likeBtn.classList.add("liked");
        likeBtn.querySelector("svg").setAttribute("fill", "currentColor");
        likeBtn.querySelector("span").textContent = (m.likes || 0) + 1;
      } catch (e) {
        console.error(e);
        likeBtn.disabled = false;
      }
    });
  }

  const commentToggle = document.createElement("button");
  commentToggle.className = "comment-toggle";
  commentToggle.textContent = "Comments";

  actions.appendChild(likeBtn);
  actions.appendChild(commentToggle);

  const section = buildCommentsSection(m);
  commentToggle.addEventListener("click", () => {
    section.classList.toggle("open");
    if (section.classList.contains("open") && !section.dataset.loaded) {
      loadCommentsInto(section, m.id);
      section.dataset.loaded = "true";
    }
  });

  const wrapper = document.createElement("div");
  wrapper.appendChild(actions);
  wrapper.appendChild(section);
  return wrapper;
}

function buildCommentsSection(m) {
  const section = document.createElement("div");
  section.className = "comments-section";

  const list = document.createElement("div");
  list.className = "comments-list";
  list.innerHTML = '<p class="comment-empty">Loading comments...</p>';

  const form = document.createElement("div");
  form.className = "comment-form";
  const input = document.createElement("input");
  input.type = "text";
  input.placeholder = "Say something nice (or absurd)";
  input.maxLength = 200;
  const submitBtn = document.createElement("button");
  submitBtn.textContent = "Post";

  submitBtn.addEventListener("click", async () => {
    const text = input.value.trim();
    if (!text) return;
    submitBtn.disabled = true;
    try {
      await postComment(m.id, text);
      input.value = "";
      await loadCommentsInto(section, m.id);
    } catch (e) {
      console.error(e);
    } finally {
      submitBtn.disabled = false;
    }
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") submitBtn.click();
  });

  form.appendChild(input);
  form.appendChild(submitBtn);
  section.appendChild(list);
  section.appendChild(form);
  return section;
}

async function loadCommentsInto(section, memeId) {
  const list = section.querySelector(".comments-list");
  try {
    const comments = await fetchComments(memeId);
    list.innerHTML = "";
    if (comments.length === 0) {
      list.innerHTML = '<p class="comment-empty">No comments yet. Be the first.</p>';
    } else {
      comments.forEach((c) => {
        const item = document.createElement("div");
        item.className = "comment-item";
        item.textContent = c.body;
        list.appendChild(item);
      });
    }
  } catch (e) {
    list.innerHTML = '<p class="comment-empty">Couldn\'t load comments.</p>';
  }
}

function attachImageWithRetry(img, overlay, meme, attempt) {
  attempt = attempt || 1;
  const maxAttempts = 3;
  const waitTimes = [1500, 3000];

  img.addEventListener("load", () => { overlay.remove(); }, { once: true });
  img.addEventListener("error", () => {
    if (attempt < maxAttempts) {
      const wait = waitTimes[attempt - 1] || 3000;
      overlay.innerHTML = '<span class="spinner"></span><span>Retrying...</span>';
      setTimeout(() => {
        img.src = meme.image_url + "?retry=" + Date.now();
        attachImageWithRetry(img, overlay, meme, attempt + 1);
      }, wait);
    } else {
      overlay.innerHTML = '<span style="color:#d8513e; font-weight:600;">Image unavailable</span>';
      const retryBtn = document.createElement("button");
      retryBtn.className = "retry-btn";
      retryBtn.textContent = "Retry";
      retryBtn.addEventListener("click", () => {
        overlay.innerHTML = '<span class="spinner"></span><span>Loading image...</span>';
        img.src = meme.image_url + "?retry=" + Date.now();
        attachImageWithRetry(img, overlay, meme, 1);
      });
      overlay.appendChild(document.createElement("br"));
      overlay.appendChild(retryBtn);
    }
  });

  img.src = meme.image_url;
}

async function refreshGallery() {
  try {
    const memes = await fetchMemes();
    renderGallery(memes);
  } catch (e) {
    console.error(e);
  }
}

async function generateOneMeme() {
  const btn = document.getElementById("generate-btn");
  const originalLabel = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = "Generating...";

  try {
    const customPrompt = document.getElementById("prompt-input").value;
    const idea = generateIdea(customPrompt);
    const prompt = buildPrompt(idea);
    const seed = Math.floor(Math.random() * 1000000);
    const sourceUrl = buildPollinationsUrl(prompt, seed);

    btn.innerHTML = "Creating image...";
    const blob = await fetchAsBlob(sourceUrl);

    btn.innerHTML = "Saving...";
    const filename = Date.now() + "-" + seed + ".png";
    const permanentUrl = await uploadToStorage(blob, filename);

    const caption = pick(LOCAL_CAPTIONS);
    await insertMeme({ image_url: permanentUrl, caption: caption });
    document.getElementById("prompt-input").value = "";
    await refreshGallery();
  } catch (e) {
    console.error(e);
    alert("Something went wrong generating the meme. Check the console for details.");
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalLabel;
  }
}

document.getElementById("generate-btn").addEventListener("click", generateOneMeme);
document.getElementById("refresh-btn").addEventListener("click", refreshGallery);

const INTERVAL_MS = 10 * 60 * 1000;
setInterval(generateOneMeme, INTERVAL_MS);
setInterval(refreshGallery, 30000);

refreshGallery();
trackVisit();
</script>
